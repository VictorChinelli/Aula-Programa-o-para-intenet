<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Participante</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand fw-bold">
                Cadastro de Participantes
            </span>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-body p-4">

                <h2 class="card-title mb-4">
                    Cadastro de Participante
                </h2>

                <form id="formCadastro">

                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Nome completo
                        </label>

                        <input type="text"
                            id="inputNome"
                            class="form-control"
                            placeholder="Digite seu nome">

                        <div id="erroNome"
                            class="text-danger small d-none">
                            Nome obrigatorio.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            E-mail
                        </label>

                        <input type="text"
                            id="inputEmail"
                            class="form-control"
                            placeholder="Digite seu e-mail">

                        <div id="erroEmail"
                            class="text-danger small d-none">
                            E-mail obrigatorio.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            CEP
                        </label>

                        <input type="text"
                            id="inputCEP"
                            class="form-control"
                            placeholder="00000000"
                            maxlength="8">

                        <div id="statusCEP"
                            class="text-primary small mt-1">
                        </div>

                        <div id="erroCEP"
                            class="text-danger small d-none">
                            CEP invalido.
                        </div>
                    </div>

                    <div class="row">

                        <div class="col-md-8 mb-3">
                            <label class="form-label fw-bold">
                                Logradouro
                            </label>

                            <input type="text"
                                id="logradouro"
                                class="form-control"
                                readonly
                                placeholder="Preenchido automaticamente">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">
                                Numero
                            </label>

                            <input type="text"
                                id="inputNumero"
                                class="form-control"
                                placeholder="Ex: 123">
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">
                                Bairro
                            </label>

                            <input type="text"
                                id="bairro"
                                class="form-control"
                                readonly
                                placeholder="Preenchido automaticamente">
                        </div>

                        <div class="col-md-5 mb-3">
                            <label class="form-label fw-bold">
                                Cidade
                            </label>

                            <input type="text"
                                id="cidade"
                                class="form-control"
                                readonly
                                placeholder="Preenchido automaticamente">
                        </div>

                        <div class="col-md-2 mb-3">
                            <label class="form-label fw-bold">
                                UF
                            </label>

                            <input type="text"
                                id="uf"
                                class="form-control"
                                readonly
                                placeholder="UF"
                                maxlength="2">
                        </div>

                    </div>

                    <button type="submit"
                        class="btn btn-primary w-100 mt-2">
                        Confirmar Cadastro
                    </button>

                    <div id="mensagemSucesso"
                        class="alert alert-success mt-3 d-none">
                    </div>

                    <div id="mensagemErro"
                        class="alert alert-danger mt-3 d-none">
                        Preencha todos os campos obrigatorios.
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>

</body>

</html>
